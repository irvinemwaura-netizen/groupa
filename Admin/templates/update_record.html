{% load static %}
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Update Student</title>
    <link href=" https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-5">
    <div class="card shadow">
        <div class="card-header bg-success text-white">
            <h4>Update Student</h4>
        </div>
        <div class="card-body">
            <form method="POST" , enctype="multipart/form-data">
                {% csrf_token %}
                {% if students.image %}
                <div class="mb-3">
                    <label class="form-label">Current Image</label>
                    <img src="{{ students.image.url }}" alt="" width="100px" height="100px">
                </div>
                {% endif %}
                <div class="mb-3">
                    <label class="form-label">Change Image</label>
                    <input type="file" name="image" class="form-control" >
                </div>
                <div class="mb-3">
                    <label class="form-label">Student Name</label>
                    <input type="text" name="name" class="form-control" value="{{ students.name }}">
                </div>

                <div class="mb-3">
                    <label class="form-label">Course</label>
                    <input type="text" name="course" class="form-control" value="{{ students.course }}">
                </div>

                <div class="mb-3">
                    <label class="form-label">Age</label>
                    <input type="number" name="age" class="form-control" value="{{ students.age }}">
                </div>
                <div class="mb-3">
                    <label class="form-label">Email</label>
                    <input type="email" name="email" class="form-control" value="{{ students.email }}">
                </div>
                <div class="mb-3">
                    <label class="form-label">Date_of_birth</label>
                    <input type="type" name="date_of_birth" class="form-control" value="{{ students.date }}">
                </div>
                <button type="submit" class="btn btn-secondary">Update Student</button>
                <a href="{% url 'index' %}" class="btn btn-danger">Cancel</a>
            </form>
        </div>
    </div>
</div>
    </div>
</div>

</body>
</html>
