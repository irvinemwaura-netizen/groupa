<!DOCTYPE html>
<html>
<head>
    <title>Delete Record</title>
</head>
<body>

<h3>Confirm Delete</h3>
<p>
    Are you sure you want to delete
    <strong>{{ students.name }}</strong>?
</p>

<form method="POST">
    {% csrf_token %}
    <button type="submit">Yes, Delete</button>
    <a href="{% url 'index' %}">Cancel</a>
</form>

</body>
</html>
